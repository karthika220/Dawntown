<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You – Dawntown Detailing Studio</title>
  <link rel="icon" type="image/png" href="assets/Favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <!-- ═══════════════════════════════════════════════
       GOOGLE ADS — Global Site Tag (gtag.js)
       Conversion ID: AW-17986636188
  ═══════════════════════════════════════════════ -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=AW-17986636188"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'AW-17986636188');

    /* ── FORM SUBMISSION CONVERSION ────────────────────────
       Fires ONLY when a real user lands on this page after
       submitting the form. Zero ghost fires, zero duplicates.

       ⚠️  Replace FORM_CONVERSION_LABEL with the label from:
           Google Ads → Goals → Conversions → [your action]
           → Tag setup → "send_to" value after the slash.
           Example: AW-17986636188/AbCdEfGhIjKlMnOp
    ─────────────────────────────────────────────────────── */
    gtag('event', 'conversion', {
      'send_to'        : 'AW-17986636188/FORM_CONVERSION_LABEL',
      'conversion_type': 'lead'
    });
  </script>
  <!-- End Google Ads Tag -->

  <!-- ═══════════════════════════════════════════════
       GOOGLE TAG MANAGER — same container as index.html
       Replace GTM-XXXXXXX with your actual Container ID
  ═══════════════════════════════════════════════ -->
  <script>
    (function(w,d,s,l,i){
      w[l]=w[l]||[];
      w[l].push({'gtm.start': new Date().getTime(), event:'gtm.js'});
      var f=d.getElementsByTagName(s)[0],
          j=d.createElement(s),
          dl=l!='dataLayer'?'&l='+l:'';
      j.async=true;
      j.src='https://www.googletagmanager.com/gtm.js?id='+i+dl;
      f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-XXXXXXX');
  </script>
  <!-- End Google Tag Manager -->

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --red:   #DC3545;
      --dark:  #0d0d0d;
      --white: #ffffff;
    }
    body {
      font-family: 'Poppins', sans-serif;
      background: var(--dark);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    /* Logo */
    .logo { margin-bottom: 2.5rem; line-height: 1; }
    .logo-dawn { font-size: 2rem; font-weight: 900; color: var(--red); letter-spacing: 2px; }
    .logo-town { font-size: 2rem; font-weight: 900; color: var(--white); letter-spacing: 2px; }

    /* Icon */
    .ty-icon {
      width: 90px; height: 90px;
      background: rgba(220,53,69,0.12);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.8rem;
      font-size: 2.6rem;
      color: var(--red);
      animation: pop 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes pop {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    h1 {
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 800;
      margin-bottom: 0.8rem;
    }
    h1 span { color: var(--red); }

    p {
      font-size: 1rem;
      color: rgba(255,255,255,0.65);
      max-width: 440px;
      line-height: 1.7;
      margin: 0 auto 2rem;
    }

    /* Contact row */
    .contact-row {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 2.5rem;
    }
    .contact-row a {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.7rem 1.4rem;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.95rem;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .contact-row a:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.3); }
    .btn-call { background: var(--red); color: #fff; }
    .btn-wa   { background: #25D366;   color: #fff; }

    /* Back button */
    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.7rem 1.6rem;
      border-radius: 8px;
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.7);
      font-family: 'Poppins', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-back:hover { border-color: var(--red); color: var(--white); }

    /* Timer bar */
    .timer-bar-wrap {
      width: 260px;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 99px;
      margin: 2rem auto 0.5rem;
      overflow: hidden;
    }
    .timer-bar {
      height: 100%;
      background: var(--red);
      border-radius: 99px;
      animation: countdown 5s linear forwards;
    }
    @keyframes countdown {
      from { width: 100%; }
      to   { width: 0%; }
    }
    .timer-text {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.4);
    }
  </style>
</head>
<body>

  <!-- Google Tag Manager (noscript) -->
  <noscript>
    <iframe src="https://www.googletagmanager.com/ns.html?id=GTM-XXXXXXX"
            height="0" width="0" style="display:none;visibility:hidden"></iframe>
  </noscript>
  <!-- End Google Tag Manager (noscript) -->

  <!-- Logo -->
  <div class="logo">
    <span class="logo-dawn">DAWN.</span><span class="logo-town">TOWN</span>
  </div>

  <!-- Check icon -->
  <div class="ty-icon"><i class="fa-solid fa-circle-check"></i></div>

  <!-- Heading -->
  <h1>You're All Set! <span>We'll Call You.</span></h1>
  <p>Thanks for reaching out. Our team will review your details and get back to you within <strong style="color:#fff">2 hours</strong> with pricing and availability.</p>

  <!-- Direct contact -->
  <div class="contact-row">
    <a href="tel:+91900311338" class="btn-call">
      <i class="fa-solid fa-phone"></i> +91 900311338
    </a>
    <a href="https://wa.me/91900311338" target="_blank" class="btn-wa">
      <i class="fa-brands fa-whatsapp"></i> WhatsApp Us
    </a>
  </div>

  <!-- Back to site -->
  <a href="index.html" class="btn-back">
    <i class="fa-solid fa-arrow-left"></i> Back to Website
  </a>

  <!-- Auto-redirect countdown -->
  <div class="timer-bar-wrap"><div class="timer-bar"></div></div>
  <p class="timer-text">Redirecting to homepage in 5 seconds…</p>

  <script>
    // Auto-redirect after 5 s
    setTimeout(() => { window.location.href = 'index.html'; }, 5000);

    // Track call/whatsapp clicks on this page too
    window.dataLayer = window.dataLayer || [];
    document.querySelectorAll('a[href^="tel:"]').forEach(el => {
      el.addEventListener('click', () => {
        window.dataLayer.push({
          event: 'call_click',
          button_label: 'Thank You Page – Call',
          phone_number: '+91900311338'
        });
      });
    });
    document.querySelectorAll('a[href^="https://wa.me/"]').forEach(el => {
      el.addEventListener('click', () => {
        window.dataLayer.push({
          event: 'whatsapp_click',
          button_label: 'Thank You Page – WhatsApp'
        });
      });
    });
  </script>
</body>
</html>
